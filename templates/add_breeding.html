{% extends "base.html" %}
{% block title %}Add Breeding Record{% endblock %}
{% block page_title %}Breeding Records{% endblock %}
{% block page_subtitle %}Log a breeding activity{% endblock %}
{% block content %}
<div class="page-header">
  <div><h2>Add Breeding Record</h2></div>
  <a href="{{ url_for('breeding') }}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:800px;">
  <div class="card-header"><h3><i class="fas fa-venus-mars" style="color:var(--primary);margin-right:8px"></i>Breeding Details</h3></div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group"><label>Female Tag Number *</label><input type="text" name="female_tag" placeholder="Female animal tag" required/></div>
        <div class="form-group"><label>Male Tag Number *</label><input type="text" name="male_tag" placeholder="Male animal tag" required/></div>
        <div class="form-group"><label>Animal Type *</label>
          <select name="animal_type" required><option value="">-- Select --</option>
          <option>Cattle</option><option>Goat</option><option>Sheep</option><option>Pig</option><option>Rabbit</option></select>
        </div>
        <div class="form-group"><label>Breeding Date *</label><input type="date" name="breeding_date" required/></div>
        <div class="form-group"><label>Expected Delivery Date</label><input type="date" name="expected_delivery"/></div>
        <div class="form-group"><label>Actual Delivery Date</label><input type="date" name="actual_delivery"/></div>
        <div class="form-group"><label>Number of Offspring</label><input type="number" name="offspring_count" value="0" min="0"/></div>
        <div class="form-group"><label>Status *</label>
          <select name="status" required><option>Pending</option><option>Delivered</option><option>Failed</option></select>
        </div>
        <div class="form-group full"><label>Notes</label><textarea name="notes" placeholder="Additional notes..."></textarea></div>
      </div>
      <div style="margin-top:20px;display:flex;gap:12px;">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save</button>
        <a href="{{ url_for('breeding') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
