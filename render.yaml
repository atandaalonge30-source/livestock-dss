services:
  - type: web
    name: livestock-dss
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: livestock-db
          property: connectionString

databases:
  - name: livestock-db
    plan: free
